<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Sleep & Slay - Sign Up</title>
    <link rel="stylesheet" href="../src/sign up.css">
</head>
<body>
    <div class="signup-wrapper">
    <div class="signup-card"> 
      <div class="signup-left">
        <div class="brand-pill">AK SLEEP & SLAY</div>
        <h1>Create an account</h1>
        <p class="tagline">Sign Up and get 30-day free trial</p>
<form class="signup-form" action="#" method="post">
          <label>
            <span>Full name</span>
            <input type="text" name="name" placeholder="Your full name" required />
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="you@example.com" required />
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="Create password" required />
          </label>
           <button type="submit" class="btn-signup-card">Sign Up</button>
        </form>

        <div class="social-row">
          <button class="social-btn">Continue with Apple</button>
          <button class="social-btn">Continue with Google</button>
        </div>

        <p class="small-footer">Have an account? <a href="#">Sign in</a> • <a href="#">Terms & conditions</a></p>
      </div>

      <div class="signup-right">
        <div class="image-frame">
            <img src="../images/signup1.jpg" alt="image2" />
        </div>
      </div> 
      </div>
  </div>
  <script src="../src/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Sleep & Slay</title>

<!-- Font Awesome -->
<script src="https://kit.fontawesome.com/416eee93e4.js" crossorigin="anonymous"></script>

<link rel="stylesheet" href="../src/shop.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="left">
      <i class="fas fa-bars"></i>
      <div>
        <h3>Hi, Dela Gray</h3>
        <p class="subtext">Find your cozy sleep essentials here!</p>
      </div>
    </div>

    <div class="right">
      <i class="fas fa-search"></i>
      <i class="fas fa-user"></i>
    </div>
  </header>

  <!-- CATEGORY -->
  <div class="categories">
    <div class="cat"><i class="fas fa-tshirt"></i><p>Pyjamas</p></div>
    <div class="cat"><i class="fas fa-socks"></i><p>Socks</p></div>
    <div class="cat"><i class="fas fa-bed"></i><p>Pillows</p></div>
    <div class="cat"><i class="fas fa-shoe-prints"></i><p>Bedroom slippers</p></div>
  </div>

  <!-- PRODUCTS -->
  <div class="grid">

    <!-- CARD -->
    <div class="card">
      <i class="fa-regular fa-heart heart"></i>
      <div class="img-box">
      <img src="../images/pyjamas1.jpg" alt="Silk Pyjamas" class="product-image" width="489">
      </div>
      <h4 class="product-name">Silk Pyjamas</h4>
      <p>300</p>
      <button>Add To Cart</button>
    </div>

    <div class="card">
      <i class="fa-regular fa-heart heart"></i>
      <div class="img-box">
      <img src="../images/3rd bow bonnet.jpg" alt="3rd Bow Bonnet" class="product-image" width="489">
      </div>
      <h4 class="product-name">Bow Bonnet</h4>
      <p>80</p>
      <button>Add To Cart</button>
    </div>

    <div class="card">
      <i class="fa-regular fa-heart heart"></i>
      <div class="img-box">
      <img src="../images/cushion.jpg" alt="Cushion" class="product-image" width="489px">
      </div>
      <h4 class="product-name">Cushion</h4>
      <p>50</p>
      <button>Add To Cart</button>
    </div>

    <div class="card">
      <i class="fa-regular fa-heart heart"></i>
      <div class="img-box">
      <img src="../images/pink duvet.jpg" alt="Pink Duvet" class="product-image" width="489">
      </div>
      <h4 class="product-name">Fluffy Duvet</h4>
      <p>450</p>
      <button>Add To Cart</button>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom">
    <i class="fas fa-home"></i>
    <i class="fas fa-shopping-cart"></i>
    <i class="fas fa-heart"></i>
    <i class="fas fa-cog"></i>
  </nav>

</div>

</body>
</html>

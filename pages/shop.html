<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AK Sleep & Slay</title>

    <!-- Font Awesome -->
    <script
      src="https://kit.fontawesome.com/416eee93e4.js"
      crossorigin="anonymous"
    ></script>

    <link rel="stylesheet" href="../src/shop.css" />
  </head>

  <body>
    <div class="app">
      <!-- HEADER -->
      <header class="header">
        <div class="left">
          <i class="fas fa-bars"></i>
          <div>
            <h3>Hi, Dela Gray</h3>
            <p class="subtext">Find your cozy sleep essentials here!</p>
          </div>
        </div>

        <div class="right">
          <i class="fas fa-search"></i>
          <i class="fas fa-user"></i>
        </div>
      </header>

      <!-- CATEGORY -->
      <div class="categories">
        <div class="cat">
          <i class="fas fa-tshirt"></i>
          <p>Pyjamas</p>
        </div>
        <div class="cat">
          <i class="fas fa-socks"></i>
          <p>Socks</p>
        </div>
        <div class="cat">
          <i class="fas fa-bed"></i>
          <p>Pillows</p>
        </div>
        <div class="cat">
          <i class="fas fa-shoe-prints"></i>
          <p>Bedroom slippers</p>
        </div>
      </div>

      <!-- PRODUCTS -->
      <div class="grid" id="product-list"></div>

      <!-- BOTTOM NAV -->
      <nav class="bottom">
        <a href="../index.html"><i class="fas fa-home"></i></a>
        <a href="../pages/cart.html" class="cart-link">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-count" id="cart-count">0</span>
        </a>
        <a href="../pages/wishlist.html"><i class="fas fa-heart"></i></a>
        <a href="../pages/settings.html"><i class="fas fa-cog"></i></a>
      </nav>

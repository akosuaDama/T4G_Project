<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart - Ak Sleep & Slay</title>
    <link rel="stylesheet" href="../src/cart.css" />
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-logo">
          <span class="logo-text">Ak Sleep & Slay</span>
        </div>
        <ul class="nav-menu">
          <li class="nav-item">
            <a href="../index.html" class="nav-link">Home</a>
          </li>
          <li class="nav-item">
            <a href="../pages/about.html" class="nav-link">About</a>
          </li>
          <li class="nav-item">
            <a href="../pages/shop.html" class="nav-link">Shop</a>
          </li>
          <li class="nav-item">
            <a href="../pages/cart.html" class="nav-link active">
              Cart <span id="cart-count" class="cart-count">0</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="../pages/contact.html" class="nav-link">Contact</a>
          </li>
          <li class="nav-item">
            <a href="../pages/search.html" class="nav-link">Search</a>
          </li>
          <li class="nav-item">
            <a href="../pages/blog.html" class="nav-link">Blog</a>
          </li>
          <li class="nav-item user-icon">
            <a href="#user" class="nav-link">👤</a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Main Container -->
    <main class="cart-container">
      <!-- Checkout Progress -->
      <section class="progress-section">
        <div class="progress-container">
          <div class="progress-step active">
            <div class="step-circle">1</div>
            <span class="step-label">Shopping Cart</span>
          </div>
          <div class="progress-line"></div>
          <div class="progress-step">
            <div class="step-circle">2</div>
            <span class="step-label">Details</span>
          </div>
          <div class="progress-line"></div>
          <div class="progress-step">
            <div class="step-circle">3</div>
            <span class="step-label">Payment</span>
          </div>
        </div>
      </section>

      <!-- Cart Content -->
      <div class="cart-content">
        <!-- Left Section: Cart Items -->
        <section class="cart-items-section">
          <h2 class="section-title">Your Shopping Cart</h2>
          <!-- Cart Items will be injected here -->
          <div class="items-list" id="cart-items"></div>
        </section>

        <!-- Right Section: Order Summary + Payment -->
        <section class="checkout-section">
          <!-- Order Summary -->
          <div class="order-summary">
            <h3 class="summary-title">Order Summary</h3>
            <div class="summary-row">
              <span class="summary-label">Sub Total</span>
              <span class="summary-value" id="subtotal">$0</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Discount</span>
              <span class="summary-value" id="discount">$0</span>
            </div>
            <div class="summary-row">
              <span class="summary-label">Shipping</span>
              <span class="summary-value shipping-free" id="shipping"
                >FREE</span
              >
            </div>
            <div class="summary-divider"></div>
            <div class="summary-row total-row">
              <span class="summary-label">Order Total</span>
              <span class="summary-value total-amount" id="total">$0</span>
            </div>
          </div>

          <!-- Payment Section -->
          <div class="payment-section">
            <h3 class="payment-title">Payment Details</h3>
            <form class="payment-form">
              <div class="form-group">
                <label for="card-number" class="form-label">Card Number</label>
                <input
                  type="text"
                  id="card-number"
                  class="form-input card-input"
                  placeholder="1234 5678 9012 3456"
                  maxlength="19"
                />
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="expiry-date" class="form-label"
                    >Expiry Date</label
                  >
                  <input
                    type="text"
                    id="expiry-date"
                    class="form-input expiry-input"
                    placeholder="MM/YY"
                    maxlength="5"
                  />
                </div>

                <div class="form-group">
                  <label for="cvv" class="form-label"
                    >Security Code (CVV)</label
                  >
                  <input
                    type="text"
                    id="cvv"
                    class="form-input cvv-input"
                    placeholder="123"
                    maxlength="4"
                  />
                </div>
              </div>

              <button type="submit" class="checkout-btn">
                Proceed to Payment
              </button>
            </form>
          </div>

          <!-- Continue Shopping Link -->
          <div class="continue-shopping">
            <a href="../pages/shop.html" class="continue-link"
              >← Continue Shopping</a
            >
          </div>
        </section>
      </div>
    </main>

    <!-- JS -->
    <script src="../src/cart.js"></script>
  </body>
</html>
